<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>FitCoach</title>
<style>
  :root{color-scheme:light dark;--bg:#f4f6f7;--panel:#fff;--ink:#1b1f24;--dim:#6b7178;--line:rgba(0,0,0,.1);--lime:#4a7c00;--brand:#c8ff2e}
  @media(prefers-color-scheme:dark){:root{--bg:#14181d;--panel:#20252c;--ink:#eaf2f0;--dim:#9aa3ab;--line:rgba(255,255,255,.1);--lime:#c8ff2e}}
  *{box-sizing:border-box}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;max-width:560px;margin:0 auto;padding:0 1.25rem 4rem;line-height:1.6;color:var(--ink);background:var(--bg);text-align:center}
  .hero{padding:4rem 0 1rem}
  .hero img{width:92px;height:92px;border-radius:21px;box-shadow:0 10px 30px rgba(0,0,0,.3)}
  h1{font-size:1.8rem;margin:1rem 0 .3rem;letter-spacing:-.02em}
  .tag{color:var(--dim);margin:0 0 .6rem}
  .pill{display:inline-block;background:var(--brand);color:#10130a;font-weight:800;font-size:.72rem;letter-spacing:.06em;padding:.3rem .7rem;border-radius:999px;text-transform:uppercase}
  .links{display:flex;flex-direction:column;gap:.75rem;max-width:340px;margin:2rem auto 0}
  .links a{display:block;background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:1rem;color:var(--ink);text-decoration:none;font-weight:600;font-size:1.05rem}
  .links a:hover{border-color:var(--brand)}
  .foot{color:var(--dim);font-size:.85rem;margin-top:2.5rem}
  .foot a{color:var(--lime)}
</style>
</head>
<body>
<div class="hero">
  <img src="icon.png" alt="FitCoach">
  <h1>FitCoach</h1>
  <p class="tag">Rutinas de gym para iPhone y Apple Watch</p>
  <span class="pill">Gratis · Sin anuncios · Privada</span>
</div>
<div class="links">
  <a href="privacidad.html">Política de Privacidad →</a>
  <a href="soporte.html">Soporte →</a>
  <a href="terminos.html">Términos de uso →</a>
</div>
<p class="foot">¿Dudas? <a href="mailto:jpcruzgarcia88@gmail.com">jpcruzgarcia88@gmail.com</a></p>
</body>
</html>
